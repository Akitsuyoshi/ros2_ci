version: "3"

services:
  ros2_ci:
    build:
      context: ..
      dockerfile: ros2_ci/Dockerfile
    image: akitsuyoshi/cp24:ros2_ci
    container_name: ros2_ci
    environment:
      - DISPLAY=${DISPLAY}
      - GAZEBO_MODEL_PATH=/usr/share/gazebo-11/models:/.gazebo/models:/ros2_ws/install/fastbot_description/share
      - GAZEBO_RESOURCE_PATH=/usr/share/gazebo-11:/ros2_ws/install/fastbot_description/share
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    restart: "no"